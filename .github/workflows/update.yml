name: Hundred Fantasy Auto Update

on:
  schedule:
    # Once daily at 03:00 IST. GitHub cron is UTC, and IST = UTC+5:30,
    # so 03:00 IST == 21:30 UTC the previous day.
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hundred-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stats from CricketData
        env:
          CRICKET_DATA_API_KEY: ${{ secrets.CRICKET_DATA_API_KEY }}
          HUNDRED_SERIES_ID: ${{ vars.HUNDRED_SERIES_ID }}
        run: python fetch_hundred_stats.py

      - name: Score fantasy squads
        run: python fantasy_points.py

      - name: Snapshot history (for trend charts)
        run: python -c "import auto_update_and_push as a; a.update_history_files()"

      - name: Commit updated files
        run: |
          git config user.name "auto-bot"
          git config user.email "auto@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto update fantasy data"
            git pull --rebase origin main
            git push
          fi
